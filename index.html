<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oscilloscope Viewer (Web)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Oscilloscope Viewer (Web)</h1>

      <div class="toolbar-row">
        <div class="btn-group" aria-label="Data">
          <label class="btn">
            <input id="file-input" type="file" multiple webkitdirectory />
            <span>Select Folder</span>
          </label>
          <select id="event-select"></select>
          <button id="prev-btn" type="button">Prev</button>
          <button id="next-btn" type="button">Next</button>
        </div>

        <div class="btn-group right" aria-label="Display">
          <label>Decim: <input id="decim" type="number" min="1" max="200" step="1" value="20" /></label>
          <label><input id="stack-vert" type="checkbox" checked /> Stack Vertically</label>
          <button id="theme-btn" type="button">Light Mode</button>
          <button id="help-btn" type="button">Help</button>
        </div>
      </div>

      <div class="toolbar-row">
        <div class="btn-group" aria-label="Tools">
          <label>Tool:
            <select id="tool-select">
              <option value="zoom">Zoom</option>
              <option value="pan">Pan</option>
            </select>
          </label>
          <button id="reset-view-btn" type="button">Reset View</button>
          <button id="autoscale-y-btn" type="button">Auto Y</button>

          <details id="channel-visibility" class="channel-visibility">
            <summary id="channel-menu-summary">Channels</summary>
            <div class="channel-menu-panel">
              <div class="channel-menu-actions">
                <button id="show-all-channels" type="button">Show All</button>
                <button id="hide-all-channels" type="button">Hide All</button>
              </div>
              <div id="channel-toggle-list" class="channel-toggle-list"></div>
            </div>
          </details>
        </div>

        <div class="btn-group right" aria-label="SG Filter">
          <button id="sg-btn" type="button">SG Filter</button>
          <label>Chan: <select id="sg-chan"></select></label>
          <label>Width: <input id="sg-width" type="number" min="5" max="9999" step="2" value="200" /></label>
          <button id="sg-clear-btn" type="button">Clear Filter</button>
        </div>
      </div>
    </header>

    <main>
      <div id="plots" class="plots"></div>
    </main>
  </div>

  <div id="busy" class="busy hidden">
    <div class="busy-box">
      <div id="busy-text">Working…</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
